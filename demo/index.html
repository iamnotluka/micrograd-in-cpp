<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>micrograd digit demo</title>
    <meta name="description" content="Draw a digit and run a tiny micrograd MLP in the browser." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="../README.md" class="name">micrograd in cpp</a>
      <a href="https://www.zoricl.io">zoricl.io</a>
    </header>

    <main>
      <div class="title-row">
        <div>
          <h1>Draw a digit</h1>
          <p class="subtle">28 x 28 input · 784 values · 10 outputs</p>
        </div>
        <p class="model-status" id="model-status">loading model</p>
      </div>

      <section class="demo-grid" aria-label="digit classifier">
        <div class="drawing-panel">
          <canvas
            id="digit-canvas"
            width="28"
            height="28"
            aria-label="drawn digit input"
          ></canvas>

          <div class="toolbar" aria-label="drawing controls">
            <div class="mode-control" role="group" aria-label="drawing mode">
              <button class="mode-button is-active" id="draw-button" type="button" aria-pressed="true">draw</button>
              <button class="mode-button" id="erase-button" type="button" aria-pressed="false">erase</button>
              <button class="mode-button reset-button" id="reset-button" type="button">reset</button>
            </div>

            <label class="brush-control" for="brush-size">
              <span>brush</span>
              <input id="brush-size" type="range" min="1" max="4" step="0.25" value="1.75" />
            </label>
          </div>
        </div>

        <aside class="prediction-panel" aria-label="prediction">
          <div class="prediction-top">
            <span class="label">prediction</span>
            <output class="predicted-digit" id="predicted-digit">-</output>
          </div>

          <ol class="confidence-list" id="confidence-list" aria-label="digit confidence levels"></ol>
        </aside>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
